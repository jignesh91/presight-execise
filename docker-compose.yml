services:
  server:
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "4000:4000"
    environment:
      - PORT=4000
      - DB_PATH=/app/data/users.db
    volumes:
      - server-data:/app/data

  client:
    build:
      context: .
      dockerfile: Dockerfile.client
    ports:
      - "3000:3000"
    depends_on:
      - server

volumes:
  server-data:
